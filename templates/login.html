<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Doctor Login</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

  <style>
    body {
      background: #f8f9fa;
      padding-top: 70px;
      font-family: 'Segoe UI', sans-serif;
    }

    .login-box {
      max-width: 480px;
      margin: auto;
      padding: 40px;
      background: #ffffff;
      border-radius: 22px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.08);
    }

    .title {
      text-align: center;
      font-weight: 800;
      color: #4a4e69;
      margin-bottom: 20px;
    }

    .subtitle {
      text-align: center;
      font-size: 0.95rem;
      color: #6c757d;
      margin-bottom: 25px;
    }

    .btn-primary {
      width: 100%;
      padding: 10px;
      border-radius: 12px;
      font-weight: 600;
    }

    .form-control {
      border-radius: 12px;
      padding: 10px;
    }

    .bottom-text {
      text-align: center;
      margin-top: 18px;
      font-size: 0.95rem;
    }

    .bottom-text a {
      text-decoration: none;
      font-weight: 600;
      color: #6c63ff;
    }

    .bottom-text a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <div class="login-box">
    <h3 class="title">👨‍⚕️ Doctor Login</h3>
    <div class="subtitle">
      Enter your credentials to access the Admin Panel securely
    </div>

    <!-- ✅ Error Message -->
    {% if error %}
      <div class="alert alert-danger text-center">
        {{ error }}
      </div>
    {% endif %}

    <form method="POST" action="{{ url_for('login') }}">

      <div class="mb-3">
        <label class="form-label"><b>Username</b></label>
        <input type="text" name="username" class="form-control" required placeholder="Enter username">
      </div>

      <div class="mb-3">
        <label class="form-label"><b>Password</b></label>
        <input type="password" name="password" class="form-control" required placeholder="Enter password">
      </div>

      <button type="submit" class="btn btn-primary">
        Login
      </button>

      <div class="bottom-text">
        New Doctor?
        <a href="{{ url_for('signup') }}">Create Account</a>
      </div>

    </form>
  </div>

</body>
</html>
