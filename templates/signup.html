<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Doctor Signup</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    body { background:#f8f9fa; padding-top:60px; font-family:'Segoe UI',sans-serif; }
    .box { max-width:480px; margin:auto; background:white; padding:35px; border-radius:20px;
           box-shadow:0 8px 25px rgba(0,0,0,0.08); }
    h3 { text-align:center; font-weight:700; color:#4a4e69; margin-bottom:20px; }
    .btn-primary { width:100%; padding:10px; border-radius:12px; font-weight:600; }
  </style>
</head>
<body>

  <div class="box">
    <h3>🩺 Doctor Signup</h3>

    {% if error %}
      <div class="alert alert-danger text-center">{{ error }}</div>
    {% endif %}

    <form method="POST">
      <div class="mb-3">
        <label class="form-label">Full Name</label>
        <input type="text" name="fullname" class="form-control" required placeholder="Enter your name">
      </div>

      <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" required placeholder="Create username">
      </div>

      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" required placeholder="Create password">
      </div>

      <button type="submit" class="btn btn-primary">Signup</button>

      <p class="text-center mt-3">
        Already have account?
        <a href="{{ url_for('login') }}">Login</a>
      </p>
    </form>
  </div>

</body>
</html>
